<h2>提醒方式</h2>
<p class="subtitle">番茄钟结束时希望如何提醒你？</p>

<div class="options">
  <div class="option" data-choice="notification" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>系统通知</h3>
      <p>使用 macOS 原生通知，简洁集成，可设置声音。</p>
    </div>
  </div>
  <div class="option" data-choice="alert" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>弹窗提醒</h3>
      <p>弹出窗口强制提醒，更醒目，但会中断当前操作。</p>
    </div>
  </div>
  <div class="option" data-choice="both" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>两者结合</h3>
      <p>默认系统通知，可配置为重要时刻弹窗。</p>
    </div>
  </div>
</div>
