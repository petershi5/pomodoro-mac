<h2>统计 & 设置面板</h2>
<p class="subtitle">左侧为统计视图，右侧为设置视图</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">统计面板</div>
    <div class="mockup-body">
      <div style="padding: 16px; background: #FFF5F5; border-radius: 16px; font-family: -apple-system, sans-serif; min-height: 360px;">
        <div style="font-size: 13px; font-weight: 600; color: #2D2D2D; margin-bottom: 16px;">今日完成</div>

        <!-- Circle Progress -->
        <div style="text-align: center; margin-bottom: 16px;">
          <div style="width: 100px; height: 100px; border-radius: 50%; border: 8px solid #FF6347; margin: 0 auto; display: flex; align-items: center; justify-content: center; position: relative;">
            <div style="text-align: center;">
              <div style="font-size: 28px; font-weight: 700; color: #FF6347;">5</div>
              <div style="font-size: 10px; color: #6B6B6B;">/ 8 番茄</div>
            </div>
          </div>
          <div style="font-size: 11px; color: #6B6B6B; margin-top: 8px;">完成率 62%</div>
        </div>

        <!-- Stats Row -->
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
          <div style="flex: 1; padding: 12px 8px; background: white; border-radius: 8px; text-align: center;">
            <div style="font-size: 16px; font-weight: 700; color: #FF6347;">2h 5m</div>
            <div style="font-size: 9px; color: #6B6B6B;">专注时长</div>
          </div>
          <div style="flex: 1; padding: 12px 8px; background: white; border-radius: 8px; text-align: center;">
            <div style="font-size: 16px; font-weight: 700; color: #81C784;">45m</div>
            <div style="font-size: 9px; color: #6B6B6B;">休息时长</div>
          </div>
        </div>

        <!-- 7 Day Chart -->
        <div style="font-size: 12px; font-weight: 600; color: #2D2D2D; margin-bottom: 8px;">近 7 天</div>
        <div style="display: flex; align-items: flex-end; gap: 6px; height: 60px; padding: 8px; background: white; border-radius: 8px;">
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 100%; background: #FF6347; border-radius: 2px; height: 30px;"></div>
            <div style="font-size: 9px; color: #6B6B6B;">一</div>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 100%; background: #FF6347; border-radius: 2px; height: 50px;"></div>
            <div style="font-size: 9px; color: #6B6B6B;">二</div>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 100%; background: #FF6347; border-radius: 2px; height: 40px;"></div>
            <div style="font-size: 9px; color: #6B6B6B;">三</div>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 100%; background: #FF6347; border-radius: 2px; height: 60px;"></div>
            <div style="font-size: 9px; color: #6B6B6B;">四</div>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 100%; background: #FF6347; border-radius: 2px; height: 45px;"></div>
            <div style="font-size: 9px; color: #6B6B6B;">五</div>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 100%; background: #FFE4E1; border-radius: 2px; height: 15px;"></div>
            <div style="font-size: 9px; color: #6B6B6B;">六</div>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 100%; background: #FF6347; border-radius: 2px; height: 35px;"></div>
            <div style="font-size: 9px; color: #6B6B6B;">日</div>
          </div>
        </div>

        <div style="font-size: 10px; color: #6B6B6B; text-align: center; margin-top: 8px;">本周累计 25 个番茄</div>
      </div>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">设置面板</div>
    <div class="mockup-body">
      <div style="padding: 16px; background: #FFF5F5; border-radius: 16px; font-family: -apple-system, sans-serif; min-height: 360px;">

        <div style="font-size: 12px; font-weight: 600; color: #2D2D2D; margin-bottom: 12px;">⏱ 时长设置</div>
        <div style="background: white; border-radius: 8px; padding: 12px; margin-bottom: 16px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span style="font-size: 12px; color: #2D2D2D;">专注时长</span>
            <span style="font-size: 12px; color: #FF6347; font-weight: 600;">25 分钟</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span style="font-size: 12px; color: #2D2D2D;">短休息</span>
            <span style="font-size: 12px; color: #81C784; font-weight: 600;">5 分钟</span>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span style="font-size: 12px; color: #2D2D2D;">长休息</span>
            <span style="font-size: 12px; color: #81C784; font-weight: 600;">15 分钟</span>
          </div>
        </div>

        <div style="font-size: 12px; font-weight: 600; color: #2D2D2D; margin-bottom: 12px;">🔔 提醒设置</div>
        <div style="background: white; border-radius: 8px; padding: 12px; margin-bottom: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="font-size: 12px; color: #2D2D2D;">系统通知</span>
            <div style="width: 36px; height: 20px; background: #4CAF50; border-radius: 10px; position: relative;">
              <div style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; right: 2px; top: 2px;"></div>
            </div>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="font-size: 12px; color: #2D2D2D;">弹窗提醒</span>
            <div style="width: 36px; height: 20px; background: #DDD; border-radius: 10px; position: relative;">
              <div style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; left: 2px; top: 2px;"></div>
            </div>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 12px; color: #2D2D2D;">提示音</span>
            <div style="width: 36px; height: 20px; background: #4CAF50; border-radius: 10px; position: relative;">
              <div style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; right: 2px; top: 2px;"></div>
            </div>
          </div>
        </div>

        <div style="font-size: 12px; font-weight: 600; color: #2D2D2D; margin-bottom: 12px;">🎯 目标设置</div>
        <div style="background: white; border-radius: 8px; padding: 12px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 12px; color: #2D2D2D;">每日番茄目标</span>
            <span style="font-size: 14px; color: #FF6347; font-weight: 700;">8 个</span>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
