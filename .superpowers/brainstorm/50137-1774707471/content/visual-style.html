<h2>视觉风格</h2>
<p class="subtitle">应用界面想要什么外观？</p>

<div class="options">
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简洁现代</h3>
      <p>大量留白，扁平化设计，单色或双色系。类似 Linear、Raycast 风格。</p>
    </div>
  </div>
  <div class="option" data-choice="warm" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>温暖舒适</h3>
      <p>柔和圆角，番茄红/橙色系，强调休息时的放松感。</p>
    </div>
  </div>
  <div class="option" data-choice="native" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>原生风格</h3>
      <p>遵循 Apple HIG 设计规范，融入系统外观，开箱即用。</p>
    </div>
  </div>
</div>
