<h2>App Icon 设计方案</h2>
<p class="subtitle">选择一个设计方案，然后细化</p>

<div class="options">
  <div class="option" data-choice="tomato" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>番茄主题</h3>
      <p>圆润的红色番茄，带有简洁的叶子装饰，经典番茄钟形象</p>
    </div>
  </div>
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>极简圆形</h3>
      <p>简约的圆形图标，番茄红色填充，中央有计时器符号</p>
    </div>
  </div>
  <div class="option" data-choice="modern" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>现代渐变</h3>
      <p>渐变红色圆形，顶部有叶子装饰，时尚简约风格</p>
    </div>
  </div>
  <div class="option" data-choice="flat" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>扁平化</h3>
      <p>纯色扁平番茄，清晰的轮廓线，适合 macOS Big Sur 风格</p>
    </div>
  </div>
</div>
