<h2>番茄钟应用形态</h2>
<p class="subtitle">选择应用在 Mac 上的主要交互方式</p>

<div class="options">
  <div class="option" data-choice="menubar" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>菜单栏应用 (Menu Bar)</h3>
      <p>图标常驻屏幕顶部菜单栏，点击展开计时器面板。不占用 Dock，不显眼但随时可及。</p>
    </div>
  </div>
  <div class="option" data-choice="dock" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>窗口应用 (Dock 图标)</h3>
      <p>普通应用窗口，显示在 Dock 中。可以有更大的可视化界面，适合需要频繁查看状态的用户。</p>
    </div>
  </div>
  <div class="option" data-choice="hybrid" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合模式</h3>
      <p>菜单栏快速控制 + 点击后展开详细窗口。功能最全，但实现复杂度稍高。</p>
    </div>
  </div>
</div>
