<h2>核心功能范围</h2>
<p class="subtitle">番茄钟需要有哪些主要功能？</p>

<div class="options">
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极简核心</h3>
      <p>25分钟专注 / 5分钟休息，两个状态自动切换，只做计时提醒。</p>
    </div>
  </div>
  <div class="option" data-choice="balanced" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>均衡功能</h3>
      <p>可调时长 + 长休息周期 + 今日统计。适合想要追踪但不想太复杂的用户。</p>
    </div>
  </div>
  <div class="option" data-choice="rich" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>丰富功能</h3>
      <p>统计报表 + 目标设定 + 每日/周提醒 + 数据持久化。适合认真对待健康用眼的用户。</p>
    </div>
  </div>
</div>
