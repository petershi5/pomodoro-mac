<h2>UI 概念图</h2>
<p class="subtitle">番茄红/橙色温暖风格</p>

<div class="mockup">
  <div class="mockup-header">计时器面板（320 x 400pt）</div>
  <div class="mockup-body">
    <div style="padding: 20px; background: #FFF5F5; border-radius: 16px; font-family: -apple-system, sans-serif;">

      <!-- Header Tabs -->
      <div style="display: flex; gap: 8px; margin-bottom: 16px;">
        <div style="flex: 1; padding: 8px 16px; background: #FF6347; color: white; border-radius: 8px; text-align: center; font-size: 13px; font-weight: 600;">计时器</div>
        <div style="flex: 1; padding: 8px 16px; background: #FFE4E1; color: #FF6347; border-radius: 8px; text-align: center; font-size: 13px;">统计</div>
        <div style="flex: 1; padding: 8px 16px; background: #FFE4E1; color: #FF6347; border-radius: 8px; text-align: center; font-size: 13px;">设置</div>
      </div>

      <!-- Status -->
      <div style="text-align: center; margin-bottom: 8px;">
        <span style="font-size: 11px; color: #6B6B6B; text-transform: uppercase; letter-spacing: 1px;">专注中</span>
      </div>

      <!-- Timer Circle -->
      <div style="position: relative; width: 200px; height: 200px; margin: 16px auto; border-radius: 50%; border: 8px solid #FF6347; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center;">
          <div style="font-size: 48px; font-weight: 700; color: #2D2D2D; font-variant-numeric: tabular-nums;">24:35</div>
          <div style="font-size: 11px; color: #6B6B6B; margin-top: 4px;">第 3 个番茄</div>
        </div>
      </div>

      <!-- Progress dots -->
      <div style="display: flex; justify-content: center; gap: 8px; margin-bottom: 20px;">
        <div style="width: 10px; height: 10px; border-radius: 50%; background: #FF6347;"></div>
        <div style="width: 10px; height: 10px; border-radius: 50%; background: #FF6347;"></div>
        <div style="width: 10px; height: 10px; border-radius: 50%; background: #FF6347;"></div>
        <div style="width: 10px; height: 10px; border-radius: 50%; background: #DDD;"></div>
      </div>

      <!-- Buttons -->
      <div style="display: flex; gap: 12px; justify-content: center;">
        <button style="padding: 12px 32px; background: #FF6347; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;">暂停</button>
        <button style="padding: 12px 24px; background: #FFE4E1; color: #FF6347; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;">重置</button>
      </div>

      <!-- Quick Stats -->
      <div style="margin-top: 20px; padding: 12px; background: white; border-radius: 8px; display: flex; justify-content: space-around;">
        <div style="text-align: center;">
          <div style="font-size: 18px; font-weight: 700; color: #FF6347;">3</div>
          <div style="font-size: 10px; color: #6B6B6B;">今日番茄</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 18px; font-weight: 700; color: #FFA07A;">1h 15m</div>
          <div style="font-size: 10px; color: #6B6B6B;">专注时长</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 18px; font-weight: 700; color: #81C784;">5</div>
          <div style="font-size: 10px; color: #6B6B6B;">完成率</div>
        </div>
      </div>

    </div>
  </div>
</div>
