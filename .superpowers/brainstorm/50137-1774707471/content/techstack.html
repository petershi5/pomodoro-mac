<h2>技术栈选择</h2>
<p class="subtitle">用哪种技术来构建应用？</p>

<div class="options">
  <div class="option" data-choice="swift" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Swift + AppKit</h3>
      <p>原生 macOS 开发，性能最佳，与系统深度集成。需要学习 Apple 开发。</p>
    </div>
  </div>
  <div class="option" data-choice="electron" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Electron + Web 技术</h3>
      <p>使用 HTML/CSS/JS 开发，跨平台兼容性强，但包体积较大（~150MB）。</p>
    </div>
  </div>
  <div class="option" data-choice="python" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Python + Pystray / Rumps</h3>
      <p>轻量级，代码简洁，适合快速原型。但界面定制受限于 WebView。</p>
    </div>
  </div>
</div>
