<h2>扁平化图标变体</h2>
<p class="subtitle">选择你喜欢的扁平化风格</p>

<div class="options">
  <div class="option" data-choice="flat-solid" onclick="toggleSelect(this)">
    <div class="letter">D1</div>
    <div class="content">
      <h3>纯色扁平番茄</h3>
      <p>单一番茄红色填充，简洁轮廓线，无渐变无阴影</p>
    </div>
  </div>
  <div class="option" data-choice="flat-timer" onclick="toggleSelect(this)">
    <div class="letter">D2</div>
    <div class="content">
      <h3>番茄+计时器</h3>
      <p>扁平番茄中嵌入圆形计时器图案，专业感更强</p>
    </div>
  </div>
  <div class="option" data-choice="flat-outline" onclick="toggleSelect(this)">
    <div class="letter">D3</div>
    <div class="content">
      <h3>线框扁平</h3>
      <p>白色填充+红色描边，线条简洁，现代感强</p>
    </div>
  </div>
  <div class="option" data-choice="flat-abstract" onclick="toggleSelect(this)">
    <div class="letter">D4</div>
    <div class="content">
      <h3>抽象番茄</h3>
      <p>简化番茄形态为几何形状组合，时尚前卫</p>
    </div>
  </div>
</div>
