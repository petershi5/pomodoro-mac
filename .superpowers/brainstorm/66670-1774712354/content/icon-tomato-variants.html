<h2>番茄主题变体</h2>
<p class="subtitle">选择喜欢的番茄图标变体</p>

<div class="options">
  <div class="option" data-choice="classic" onclick="toggleSelect(this)">
    <div class="letter">A1</div>
    <div class="content">
      <h3>经典红番茄</h3>
      <p>圆润红色番茄 + 绿色叶子，经典番茄形象</p>
    </div>
  </div>
  <div class="option" data-choice="cute" onclick="toggleSelect(this)">
    <div class="letter">A2</div>
    <div class="content">
      <h3>可爱番茄</h3>
      <p>圆润番茄 + 小叶子 + 简单表情，更友好可爱</p>
    </div>
  </div>
  <div class="option" data-choice="modern-tomato" onclick="toggleSelect(this)">
    <div class="letter">A3</div>
    <div class="content">
      <h3>现代番茄</h3>
      <p>简化番茄形态 + 叶子装饰，扁平化但保留番茄特征</p>
    </div>
  </div>
</div>
